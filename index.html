<!doctype html>
<html lang="pt-BR">
  <head>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta
      name="description"
      content="ClipMaker AI - Edição inteligente de vídeos com IA e Cloudinary"
    />
    <title>ClipMaker AI - Next-Gen Accessible Vídeo</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./src/styles/index.css" />
    <script>
      if (localStorage.getItem('theme') === 'light') {
        document.documentElement.classList.add('light');
      }
    </script>
  </head>

  <body>
    <a href="#conteudo-principal" class="skip-link"
      >Pular para o conteúdo principal</a
    >

    <header class="main-header">
      <div class="header-content">
        <a
          href="/"
          class="logo-link"
          aria-label="ClipMaker AI - Página inicial"
        >
          <img
            src="./src/images/Clipmaker_ia_logo.jpeg"
            alt="Logo do ClipMaker AI"
            class="Imagem do logo do aplicativo, fundo preto, ao centro uma bola estilizada com o icone de start , abaixo um título e no rodapé os ícones de acessibilidade e de pessoas com deficiência auditiva e de pessoa com deficiência visual"
            width="150px"
            height="85px"
          />
        </a>

        <nav
          class="header-nav"
          aria-label="Navegação Principal"
        >
          <ul>
            <li>
              <a href="#ferramenta">Ferramenta</a>
            </li>

            <li>
              <a href="#cortes-salvos">Meus Cortes</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <div class="app-container">
      <aside class="sidebar" aria-labelledby="acc-title">
        <h3 id="acc-title" class="sidebar-title">
          Acessibilidade
        </h3>

        <div class="acc-group">
          <label> Interface: </label>
          <button
            id="theme-toggle"
            class="btn-a11y"
            aria-label="Alternar tema claro e escuro"
          >
            <img
              src="./src/icons/day-and-night.png"
              width="20px"
              height="20px"
              alt=""
              aria-hidden="true"
            />
          </button>
        </div>

        <div class="acc-group">
          <label> Leitura: </label>
          <button
            onclick="toggleDislexia()"
            class="btn-acc"
            aria-label="Ativar ou desativar fonte para dislexia"
          >
            <img
              src="./src/icons/dislexia.png"
              width="20px"
              height="20px"
              alt="botão para ativar ou desativar fonte para dislexia"
              aria-hidden="true"
            />
          </button>

          <button
            onclick="toggleTypography()"
            class="btn-acc"
            aria-label="Ativar ou desativar fonte para dislexia"
          >
            <img
              src="./src/icons/typography.png"
              width="20px"
              height="20px"
              alt="botão para ativar ou desativar aumento da fonte para melhor leitura"
              aria-hidden="true"
            />
          </button>
        </div>
      </aside>

      <main id="main-content">
        <section
          id="ferramenta"
          class="hero"
          aria-label="Ferramenta"
        >
          <h1>
            Transforme videos com Inteligência Artificial
          </h1>
          <p>
            Insira sua chave e comece a criar cortes virais
            em segundos, tudo com a ajuda da IA e do poder
            da Cloudinary.
          </p>

          <div class="input-group">
            <label for="api-key"
              >Sua Google AI API Key:</label
            >
            <input
              type="password"
              id="api-key"
              name="api-key"
              placeholder=".........."
            />
          </div>

          <div class="upload-area">
            <button id="upload-btn" class="btn-primary">
              Começar Upload
            </button>
            <p id="status-text">Pronto para processar</p>
          </div>
        </section>

        <section id="cortes-salvos" class="cuts-section">
          <h2>Meus Cortes Salvos</h2>
          <div id="lista-salvos" class="cuts-grid">
            <!-- Cortes salvos aparecerão aqui -->
          </div>
        </section>
      </main>
    </div>

    <footer></footer>

    <button
      id="back-to-top"
      title="Voltar ao topo"
      aria-label="Voltar ao topo da página"
    >
      <img
        src="./src/icons/up-arrow-bg.png"
        width="30px"
        height="30px"
        alt=""
        aria-hidden="true"
      />
    </button>

    <script src="./src/scripts/scripts.js"></script>
  </body>
</html>
