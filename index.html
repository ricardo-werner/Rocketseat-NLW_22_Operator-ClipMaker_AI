<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ClipMaker AI - Edição inteligente de vídeos com IA e Cloudinary">
  <title>ClipMaker AI - Next-Gen Accessible Vídeo</title>

  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./src/styles/index.css">
  <script>
    if (localStorage.getItem("theme") === 'light') {
      document.documentElement.classList.add("light");
    }
  </script>
  
</head>

<body>
  <a href="#conteudo-principal" class="skip-link">Pular para o conteúdo principal</a>

  <header class="main-header">
    <div class="header-content">
      <a href="/" class="logo-link" aria-label="ClipMaker AI - Página inicial"> 
        <img src="./src/images/logo.png" alt="Logo do ClipMaker AI" class="logo-img">
      </a>

      <nav class="header-nav" aria-label="Navegação Principal"
      >
        <ul>
          <li>
            <a href="#ferramenta">Ferramenta</a>
          </li>

          <li>
            <a href="#cortes-salvos">Meus Cortes</a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <div>
    <aside id="cortes-salvos" aria-label="Meus cortes salvos">
  
    </aside>

    <main id="conteudo-principal" tabindex="-1" aria-label="Ferramenta de edição">
      <section id="ferramenta" aria-label="Ferramenta"></section>
  
    </main>
  </div>

  <footer>
  </footer>

  <button id="back-to-top" title="Voltar ao topo" aria-label="Voltar ao topo da página">
    <img src="./src/icons/up-arrow-bg.png" width="30px" height="30px" alt="" aria-hidden="true">
  </button>

  <script src="./src/scripts/scripts.js"></script>
  
</body>
</html>
